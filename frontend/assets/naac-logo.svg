<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 400 400" width="100%" height="100%">
  <defs>
    <!-- Gold Gradient for Seal -->
    <radialGradient id="goldGrad" cx="50%" cy="50%" r="50%" fx="30%" fy="30%">
      <stop offset="0%" stop-color="#fff4b8" />
      <stop offset="40%" stop-color="#ffd700" />
      <stop offset="85%" stop-color="#d4af37" />
      <stop offset="100%" stop-color="#aa7c11" />
    </radialGradient>
    
    <!-- Red Ribbon Gradient -->
    <linearGradient id="redGrad" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#b31217" />
      <stop offset="50%" stop-color="#7a0004" />
      <stop offset="100%" stop-color="#4a0002" />
    </linearGradient>

    <!-- Dark Center Gradient -->
    <radialGradient id="centerGrad" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#800000" />
      <stop offset="80%" stop-color="#500000" />
      <stop offset="100%" stop-color="#300000" />
    </radialGradient>
  </defs>

  <!-- Rosette / Starburst Teeth Outer -->
  <g transform="translate(200,180)">
    <!-- 36 Serrated Teeth for Golden Seal -->
    <g fill="url(#goldGrad)">
      <path d="M 0 -130 L 10 -115 L -10 -115 Z" />
      <path d="M 0 -130 L 10 -115 L -10 -115 Z" transform="rotate(10)" />
      <path d="M 0 -130 L 10 -115 L -10 -115 Z" transform="rotate(20)" />
      <path d="M 0 -130 L 10 -115 L -10 -115 Z" transform="rotate(30)" />
      <path d="M 0 -130 L 10 -115 L -10 -115 Z" transform="rotate(40)" />
      <path d="M 0 -130 L 10 -115 L -10 -115 Z" transform="rotate(50)" />
      <path d="M 0 -130 L 10 -115 L -10 -115 Z" transform="rotate(60)" />
      <path d="M 0 -130 L 10 -115 L -10 -115 Z" transform="rotate(70)" />
      <path d="M 0 -130 L 10 -115 L -10 -115 Z" transform="rotate(80)" />
      <path d="M 0 -130 L 10 -115 L -10 -115 Z" transform="rotate(90)" />
      <path d="M 0 -130 L 10 -115 L -10 -115 Z" transform="rotate(100)" />
      <path d="M 0 -130 L 10 -115 L -10 -115 Z" transform="rotate(110)" />
      <path d="M 0 -130 L 10 -115 L -10 -115 Z" transform="rotate(120)" />
      <path d="M 0 -130 L 10 -115 L -10 -115 Z" transform="rotate(130)" />
      <path d="M 0 -130 L 10 -115 L -10 -115 Z" transform="rotate(140)" />
      <path d="M 0 -130 L 10 -115 L -10 -115 Z" transform="rotate(150)" />
      <path d="M 0 -130 L 10 -115 L -10 -115 Z" transform="rotate(160)" />
      <path d="M 0 -130 L 10 -115 L -10 -115 Z" transform="rotate(170)" />
      <path d="M 0 -130 L 10 -115 L -10 -115 Z" transform="rotate(180)" />
      <path d="M 0 -130 L 10 -115 L -10 -115 Z" transform="rotate(190)" />
      <path d="M 0 -130 L 10 -115 L -10 -115 Z" transform="rotate(200)" />
      <path d="M 0 -130 L 10 -115 L -10 -115 Z" transform="rotate(210)" />
      <path d="M 0 -130 L 10 -115 L -10 -115 Z" transform="rotate(220)" />
      <path d="M 0 -130 L 10 -115 L -10 -115 Z" transform="rotate(230)" />
      <path d="M 0 -130 L 10 -115 L -10 -115 Z" transform="rotate(240)" />
      <path d="M 0 -130 L 10 -115 L -10 -115 Z" transform="rotate(250)" />
      <path d="M 0 -130 L 10 -115 L -10 -115 Z" transform="rotate(260)" />
      <path d="M 0 -130 L 10 -115 L -10 -115 Z" transform="rotate(270)" />
      <path d="M 0 -130 L 10 -115 L -10 -115 Z" transform="rotate(280)" />
      <path d="M 0 -130 L 10 -115 L -10 -115 Z" transform="rotate(290)" />
      <path d="M 0 -130 L 10 -115 L -10 -115 Z" transform="rotate(300)" />
      <path d="M 0 -130 L 10 -115 L -10 -115 Z" transform="rotate(310)" />
      <path d="M 0 -130 L 10 -115 L -10 -115 Z" transform="rotate(320)" />
      <path d="M 0 -130 L 10 -115 L -10 -115 Z" transform="rotate(330)" />
      <path d="M 0 -130 L 10 -115 L -10 -115 Z" transform="rotate(340)" />
      <path d="M 0 -130 L 10 -115 L -10 -115 Z" transform="rotate(350)" />
    </g>

    <!-- Outer Gold Ring -->
    <circle cx="0" cy="0" r="118" fill="url(#goldGrad)" stroke="#aa7c11" stroke-width="2" />
    <circle cx="0" cy="0" r="102" fill="none" stroke="#aa7c11" stroke-width="4" stroke-dasharray="6,4" />

    <!-- Dark Red Inner Circle -->
    <circle cx="0" cy="0" r="90" fill="url(#centerGrad)" stroke="#ffd700" stroke-width="3" />

    <!-- Grade 'A' Letter -->
    <text x="0" y="32" font-family="'Arial Black', Impact, sans-serif" font-weight="900" font-size="95" fill="#ffffff" text-anchor="middle" style="filter: drop-shadow(2px 3px 2px rgba(0,0,0,0.5));">A</text>
  </g>

  <!-- Ribbon Tails (Left and Right Back) -->
  <g fill="url(#redGrad)">
    <!-- Left Ribbon End -->
    <polygon points="20,230 80,210 80,260 20,280 40,255" />
    <!-- Right Ribbon End -->
    <polygon points="380,230 320,210 320,260 380,280 360,255" />
  </g>

  <!-- Main Front Ribbon Banner -->
  <g transform="translate(200,240)">
    <!-- Banner background curvature -->
    <path d="M -130 -20 Q 0 10 130 -20 L 125 35 Q 0 65 -125 35 Z" fill="url(#redGrad)" stroke="#ffd700" stroke-width="2" />
    <!-- NAAC Text -->
    <text x="0" y="22" font-family="'Arial Black', Impact, sans-serif" font-weight="900" font-size="38" fill="#ffd700" text-anchor="middle" letter-spacing="3" style="filter: drop-shadow(1px 2px 2px rgba(0,0,0,0.8));">NAAC</text>
  </g>
</svg>
