<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 500 500" width="100%" height="100%">
  <defs>
    <path id="textArc" d="M 60 250 A 190 190 0 1 1 440 250" fill="none" />
  </defs>
  <!-- Outer Green Circle -->
  <circle cx="250" cy="250" r="235" fill="#ffffff" stroke="#71b344" stroke-width="6" />
  <circle cx="250" cy="250" r="225" fill="none" stroke="#71b344" stroke-width="2" />
  
  <!-- Arc Text -->
  <text font-family="Arial, Helvetica, sans-serif" font-weight="bold" font-size="20" fill="#1b2466" letter-spacing="3">
    <textPath href="#textArc" startOffset="50%" text-anchor="middle">
      • INSTITUTE OF TECHNOLOGY, MANAGEMENT &amp; RESEARCH •
    </textPath>
  </text>

  <!-- Globe / Grid lines top center -->
  <g transform="translate(0, -20)">
    <!-- Globe sphere fill -->
    <path d="M 120 220 A 140 140 0 0 1 380 220 Z" fill="#2b2a76" />
    <path d="M 120 220 A 140 140 0 0 1 380 220" fill="none" stroke="#ffffff" stroke-width="4" />
    <!-- Lat/Long lines -->
    <path d="M 250 80 L 250 220" stroke="#ffffff" stroke-width="4" />
    <path d="M 160 220 A 140 100 0 0 1 340 220" fill="none" stroke="#ffffff" stroke-width="4" />
    <path d="M 185 150 A 140 70 0 0 1 315 150" fill="none" stroke="#ffffff" stroke-width="4" />
    <path d="M 140 190 A 160 120 0 0 1 360 190" fill="none" stroke="#ffffff" stroke-width="4" />
  </g>

  <!-- SB JAIN Main Text -->
  <g transform="translate(110, 245)">
    <!-- SB in green -->
    <text x="0" y="70" font-family="'Arial Black', Impact, sans-serif" font-weight="900" font-size="88" fill="#74b537">SB</text>
    <!-- JAIN in Navy/Purple -->
    <text x="135" y="70" font-family="'Arial Black', Impact, sans-serif" font-weight="900" font-size="88" fill="#292873">JAIN</text>
    <!-- Flame on J -->
    <path d="M 165 -15 C 160 -35, 180 -45, 175 -60 C 185 -45, 195 -30, 185 -15 Z" fill="#ffcc00" />
    <path d="M 170 -10 C 168 -22, 178 -28, 175 -36 C 181 -27, 186 -18, 180 -10 Z" fill="#ff6600" />
  </g>

  <!-- Bottom Leaves and Sun Emblem -->
  <g transform="translate(250, 380)">
    <!-- Green Leaves curves -->
    <path d="M -160 0 C -80 -30, 0 10, -5 25 C -60 5, -120 15, -165 30 Z" fill="#69ab37" />
    <path d="M 160 0 C 80 -30, 0 10, 5 25 C 60 5, 120 15, 165 30 Z" fill="#69ab37" />
    <!-- Yellow Center Sun -->
    <circle cx="0" cy="10" r="18" fill="#ffcc00" />
    <!-- Blue accent stroke bottom -->
    <path d="M -50 65 Q 0 45 50 65 Q 0 55 -50 65" fill="#2b2a76" />
  </g>

  <!-- Sanskrit Motto -->
  <text x="250" y="430" font-family="Georgia, serif" font-weight="bold" font-size="18" fill="#1b2466" text-anchor="middle">
    ॥ विद्या धनम् सर्वधनः प्रधानम् ॥
  </text>
</svg>
